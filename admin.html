<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display | CafeCrunch</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <header class="flex justify-between items-center border-b border-slate-700 pb-4 mb-8">
        <h1 class="text-xl font-bold text-red-500 tracking-tighter">KITCHEN LIVE FEED</h1>
        <div class="text-right">
            <span id="clock" class="text-xs text-slate-500 block mb-1">00:00:00</span>
            <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded font-bold uppercase tracking-widest">Live Sync On</span>
        </div>
    </header>
    <div id="adminGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="text-slate-500 animate-pulse">Checking for new orders...</p>
    </div>
    <script src="admin.js"></script>
</body>
</html>
