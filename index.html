<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Portfolio v2 | 60+ Items</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 2px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 font-['Inter']">

    <header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-500">CafeCrunch</h1>
            <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-gray-600">Veg Only</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="vegToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                </label>
            </div>
        </div>
        
        <nav id="categoryNav" class="max-w-4xl mx-auto px-4 flex gap-6 overflow-x-auto py-3 no-scrollbar text-gray-500 font-medium">
            </nav>

        <div class="max-w-4xl mx-auto px-4 pb-4">
            <div class="relative">
                <input type="text" id="menuSearch" class="block w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:ring-1 focus:ring-red-500 outline-none transition-all" placeholder="Search 60+ dishes...">
                <span class="absolute left-3 top-3 text-gray-400">🔍</span>
            </div>
        </div>
    </header>

    <main id="menuContainer" class="max-w-4xl mx-auto px-4 py-8">
        </main>

    <script src="script.js"></script>
    <footer class="max-w-4xl mx-auto px-4 py-12 border-t border-gray-100 mt-12 text-center">
    <p class="text-gray-400 text-sm italic mb-4">Powered by Prince's Cafe Engine v2</p>
    <div class="flex justify-center gap-6 grayscale opacity-50 hover:grayscale-0 hover:opacity-100 transition-all">
        <span title="HTML5" class="text-xl">HTML5</span>
        <span title="Tailwind CSS" class="text-xl">Tailwind</span>
        <span title="JavaScript" class="text-xl">JS ES6+</span>
        <span title="Google Sheets API" class="text-xl">Sheets CMS</span>
    </div>
</footer>
<div id="cartBar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-[100]">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
            <span id="cartCount" class="font-bold text-red-500">0 Items</span>
            <p class="text-xs text-gray-500">Ready to place order?</p>
        </div>
        <button onclick="openOrderModal()" class="bg-red-500 text-white px-8 py-3 rounded-xl font-bold">View Cart</button>
    </div>
</div>

<div id="orderModal" class="hidden fixed inset-0 bg-black/50 z-[200] flex items-end sm:items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6">
        <h2 class="text-xl font-bold mb-4">Checkout</h2>
        <input type="text" id="userName" placeholder="Your Name" class="w-full p-3 border rounded-xl mb-3 outline-none focus:ring-1 focus:ring-red-500">
        <input type="tel" id="userPhone" placeholder="Phone Number" class="w-full p-3 border rounded-xl mb-3 outline-none focus:ring-1 focus:ring-red-500">
        <input type="number" id="tableNum" placeholder="Table Number" class="w-full p-3 border rounded-xl mb-6 outline-none focus:ring-1 focus:ring-red-500">
        
        <button onclick="placeOrder()" id="placeOrderBtn" class="w-full bg-red-500 text-white py-4 rounded-2xl font-bold text-lg">Place Order</button>
        <button onclick="closeModal()" class="w-full text-gray-400 mt-4 text-sm">Cancel</button>
    </div>
</div>
<div id="adminModal" class="hidden fixed inset-0 bg-black z-[300] flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl w-full max-w-sm">
        <h2 class="text-xl font-bold mb-4">Staff Login</h2>
        <input type="password" id="adminPass" placeholder="Enter Pin" class="w-full p-3 border rounded-xl mb-4 text-center text-2xl tracking-widest">
        <button onclick="checkAdmin()" class="w-full bg-black text-white py-3 rounded-xl">Login</button>
    </div>
</div>

<div id="cartFab" class="hidden fixed bottom-6 right-6 bg-red-500 text-white p-4 rounded-full shadow-2xl z-[100] cursor-pointer" onclick="openCart()">
    <span id="cartCountFab" class="bg-white text-red-500 text-xs rounded-full px-2 py-1 absolute -top-2 -right-2 font-bold">0</span>
    🛒
</div>
</body>
</html>
