<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeCrunch | Order Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-['Inter'] pb-24">
    <header class="sticky top-0 z-50 bg-white border-b p-4 shadow-sm">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-500 cursor-pointer" id="adminTrigger">CafeCrunch</h1>
            <div class="flex items-center gap-2">
                <span class="text-xs font-bold text-gray-500 uppercase">Veg Only</span>
                <input type="checkbox" id="vegToggle" class="w-10 h-5 bg-gray-200 rounded-full appearance-none checked:bg-green-500 transition-all cursor-pointer relative after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:w-3 after:h-3 after:rounded-full after:transition-all checked:after:translate-x-5">
            </div>
        </div>
        <div class="max-w-xl mx-auto mt-4 px-2">
            <input type="text" id="menuSearch" placeholder="Search for dishes..." class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-red-500/20">
            <nav id="categoryNav" class="flex gap-4 overflow-x-auto py-3 no-scrollbar text-sm font-semibold text-gray-500"></nav>
        </div>
    </header>

    <main id="menuContainer" class="max-w-xl mx-auto px-4 mt-6 space-y-8"></main>

    <div id="cartBar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-[100]">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <span id="cartCount" class="font-bold text-red-500">0 Items</span>
                <p class="text-xs text-gray-500 font-medium">Ready to place order?</p>
            </div>
            <button onclick="openModal()" class="bg-red-500 text-white px-8 py-3 rounded-xl font-bold">View Cart</button>
        </div>
    </div>

    <div id="cartFab" class="hidden fixed bottom-24 right-6 bg-red-500 text-white p-4 rounded-full shadow-2xl z-[100] cursor-pointer" onclick="openModal()">
        <span id="cartCountFab" class="bg-white text-red-500 text-xs rounded-full px-2 py-0.5 absolute -top-1 -right-1 font-bold">0</span>
        <span class="text-xl">🛒</span>
    </div>

    <div id="orderModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-t-3xl sm:rounded-3xl p-6">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Checkout</h2>
            <div class="space-y-3 mb-6">
                <input type="text" id="userName" placeholder="Your Name" class="w-full p-3 border rounded-xl outline-none focus:ring-1 focus:ring-red-500">
                <input type="tel" id="userPhone" placeholder="Phone Number" class="w-full p-3 border rounded-xl outline-none focus:ring-1 focus:ring-red-500">
                <input type="number" id="tableNum" placeholder="Table Number" class="w-full p-3 border rounded-xl outline-none focus:ring-1 focus:ring-red-500">
            </div>
            <button onclick="placeOrder()" id="placeBtn" class="w-full bg-red-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">Place Order</button>
            <button onclick="closeModal()" class="w-full text-gray-400 mt-4 text-sm font-medium">Cancel & Continue Browsing</button>
        </div>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/80 z-[300] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-4">Staff Login</h2>
            <input type="password" id="adminPass" placeholder="Enter Pin" class="w-full p-3 border rounded-xl mb-4 text-center text-2xl tracking-widest outline-none">
            <button onclick="checkAdmin()" class="w-full bg-black text-white py-3 rounded-xl font-bold">Login</button>
            <button onclick="document.getElementById('adminModal').classList.add('hidden')" class="mt-4 text-gray-400 text-xs">Back to Menu</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
